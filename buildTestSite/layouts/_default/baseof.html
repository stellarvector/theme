<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }} | Local Build Test</title>

    {{ $css := resources.Get "css/main.css" }}
    {{ $opts := dict "minify" (not hugo.IsDevelopment) }}
    {{ $style := $css | css.TailwindCSS $opts }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}">
</head>
<body class="bg-black text-white p-8">
    <header class="border-b border-slate-800 pb-4 mb-6">
        <span class="text-xs font-mono uppercase tracking-widest">Stellar Vector Theme Build Test Site</span>
    </header>

    {{ block "main" . }}{{ end }}
</body>
</html>
