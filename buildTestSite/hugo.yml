baseURL: "https://localhost:1313/"
title: "Stellar Vector Theme"

disableKinds:
  - taxonomy
  - term
  - RSS
  - sitemap
  - robotsTXT

build:
  buildStats:
    enable: true
  cachebusters:
  - source: 'assets/notwatching/hugo_stats\.json'
    target: css
  - source: '(postcss|tailwind)\.config\.js'
    target: css

markup:
  goldmark:
    renderer:
      unsafe: true

module:
  imports:
    - path: "github.com/stellarvector/theme"
  mounts:
  - source: assets
    target: assets
  - disableWatch: true
    source: hugo_stats.json
    target: assets/notwatching/hugo_stats.json
